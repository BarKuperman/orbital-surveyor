name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build mod
        run: pnpm build

      - name: Validate proxy syntax
        run: node --check proxy.js

      - name: Prepare release package
        shell: bash
        run: |
          set -euo pipefail

          MOD_VERSION="$(node -p "require('./manifest.json').version")"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${MOD_VERSION}-manual.${GITHUB_RUN_NUMBER}"
          fi
          ZIP_NAME="orbital-surveyor-${RELEASE_TAG}.zip"
          RELEASE_TITLE="${RELEASE_TAG}"

          rm -rf release
          mkdir -p release

          cp README.md dist/
          (cd dist && zip -r "../release/$ZIP_NAME" .)

          {
            echo "zip_name=$ZIP_NAME"
            echo "release_tag=$RELEASE_TAG"
            echo "release_title=$RELEASE_TITLE"
          } >> "$GITHUB_ENV"

      - name: Generate release notes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const escapeRegExp = (value) =>
              value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            const { owner, repo } = context.repo;
            const notes = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: process.env.release_tag,
              target_commitish: context.sha,
            });

            const pullUrlPattern = new RegExp(
              `https://github\\.com/${escapeRegExp(owner)}/${escapeRegExp(repo)}/pull/(\\d+)`,
              'g',
            );
            const compareUrlPattern = new RegExp(
              `https://github\\.com/${escapeRegExp(owner)}/${escapeRegExp(repo)}/compare/([^\\s)]+)`,
              'g',
            );
            const body = (notes.data.body || '')
              .replace(pullUrlPattern, (fullUrl, prNumber) => `[#${prNumber}](${fullUrl})`)
              .replace(compareUrlPattern, (fullUrl, range) => `[${range}](${fullUrl})`);

            fs.writeFileSync('release-notes.md', body);

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_tag }}
          name: ${{ env.release_title }}
          body_path: release-notes.md
          prerelease: ${{ contains(env.release_tag, '-alpha') || contains(env.release_tag, '-beta') || contains(env.release_tag, '-rc') }}
          make_latest: ${{ contains(env.release_tag, '-') && 'false' || 'true' }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release/${{ env.zip_name }}
            dist/manifest.json
